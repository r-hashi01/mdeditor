name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or limitation are you running into? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like mdeditor to behave? UI sketches / mockups welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other designs you ruled out.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: mdeditor aims to stay small and sandboxed. Features that require loosening the security model (CSP, path allowlist, PTY allowlist, ACP permissions) need explicit discussion first.
      options:
        - label: This proposal does not weaken the security model, or I have explained below why the tradeoff is worth it.
          required: true
        - label: I searched existing issues / discussions for similar requests.
          required: true
